services:
  api:
    build:
      context: .
      target: builder
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

  worker:
    build:
      context: .
      target: builder
    volumes:
      - ./app:/app/app

  pgweb:
    image: sosedoff/pgweb:latest
    ports:
      - "8081:8081"
    environment:
      PGWEB_DATABASE_URL: postgres://postgres:postgres@db:5432/xoxoedu?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
